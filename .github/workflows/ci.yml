name: AgentOS CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy pytest pytest-asyncio pydantic pydantic-settings structlog fastapi uvicorn typer

      - name: Run Ruff Linter
        run: |
          ruff check .

      - name: Check Formatting with Black
        run: |
          black --check .

      - name: Run Mypy Type Checks
        run: |
          mypy core supervisor registry agents workflow task_queue knowledge observability evaluation apps

      - name: Run Pytest Test Suite
        run: |
          pytest
